# Name of the workflow - shown in GitHub Actions tab
name: CI/CD Demo Pipeline

# Trigger - when should this pipeline run?
on:
  push:
    branches:
      - main  # Run every time code is pushed to main branch

# Jobs - the actual work to be done
jobs:
  build-and-deploy:
    # Which type of server to run on
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Check out the code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2 - Simulate running tests
      - name: Run tests
        run: |
          echo "Running tests..."
          echo "Test 1 passed!"
          echo "Test 2 passed!"
          echo "All tests passed!"

      # Step 3 - Simulate building the application
      - name: Build application
        run: |
          echo "Building application..."
          echo "Compiling code..."
          echo "Build successful!"

      # Step 4 - Simulate fetching credentials from Vault
      - name: Fetch credentials from Vault
        run: |
          echo "Connecting to Vault..."
          echo "Authenticating with AppRole..."
          echo "Credentials retrieved successfully!"

      # Step 5 - Simulate deployment
      - name: Deploy application
        run: |
          echo "Deploying to server..."
          echo "Deployment complete!"
          echo "Application is live!"